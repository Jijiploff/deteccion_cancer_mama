services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cancer-mama-backend
    ports:
      - "8000:8000"
    environment:
      CNN_MODEL_PATH: /app/models/cnn_efficientnet_20260720_125151.keras
      TABULAR_MODEL_PATH: /app/models/tabular_rf_20260720_125151.pkl
      EXTRACTOR_HYBRID_MODEL_PATH: /app/models/extractor_hibrid_rf_cnn.keras
      CLASIFIER_HYBRID_MODEL_PATH: /app/models/classifier_hibrid_rf_cnn.pkl
      WISCONSIN_CSV_PATH: /app/CSVFiles/data.csv
      FRONTEND_URL: http://localhost:3000
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      APPLY_CLAHE: "true"
      PREDICTION_THRESHOLD: "0.5"
      MAX_FILE_SIZE_MB: "5"
      RATE_LIMIT_PREDICT: 10/minute
      RATE_LIMIT_DEFAULT: 60/minute
      HISTORY_MAX_ITEMS: "50"
    volumes:
      # Monta tu modelo entrenado sin tener que reconstruir la imagen cada vez que lo cambies.
      - ./backend/models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - cancer-mama-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL que verá el NAVEGADOR del usuario (no la red interna de Docker),
        # por eso apunta a localhost:8000 y no a http://backend:8000.
        VITE_API_URL: http://localhost:8000
    container_name: cancer-mama-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cancer-mama-net

  training:
    build:
      context: ./training
      dockerfile: Dockerfile
    container_name: cancer-mama-training
    ports:
      - "8501:8501"
    environment:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: cancer_mama_2024
      DRIVE_BASE: /content/drive/MyDrive/DataSet
      TRAINING_MODELS_DIR: /app/models
      TRAINING_RESULTS_DIR: /app/results
    volumes:
      - ./backend/models:/app/models
      - ./training/results:/app/results
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cancer-mama-net

networks:
  cancer-mama-net:
    driver: bridge